plugins {
    id 'com.android.application'
}

android {
    namespace "com.rebuild.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.rebuild.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.1'
}
